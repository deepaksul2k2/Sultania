<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Classifier</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f0f2f5, #dfe9f3);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
    .upload-box {
      border: 2px dashed #ccc;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .upload-box:hover {
      background: #f9f9f9;
    }
    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      width: 100%;
    }
    button:disabled {
      background: #aaa;
    }
    .result {
      margin-top: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Image Classifier</h2>

    <label class="upload-box">
      Click to upload image
      <input type="file" id="fileInput" accept="image/*" hidden />
    </label>

    <img id="preview" style="display:none;" />

    <button id="predictBtn" disabled>Predict</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const predictBtn = document.getElementById("predictBtn");
    const resultDiv = document.getElementById("result");

    let selectedFile = null;

    document.querySelector(".upload-box").addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) {
        selectedFile = file;
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        predictBtn.disabled = false;
        resultDiv.textContent = "";
      }
    });

    predictBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      predictBtn.disabled = true;
      predictBtn.textContent = "Predicting...";

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const response = await fetch("https://sultania-app.onrender.com", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        resultDiv.textContent = "Prediction: " + (data.prediction || "N/A");
      } catch (err) {
        resultDiv.textContent = "Error occurred";
      }

      predictBtn.textContent = "Predict";
      predictBtn.disabled = false;
    });
  </script>
</body>
</html>
